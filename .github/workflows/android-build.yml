name: Android Build

on:
  push:
    branches: [main, mobile-app]
  workflow_dispatch:

jobs:
  build-android:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    defaults:
      run:
        working-directory: mobile

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: mobile/package-lock.json

      - name: Setup Java JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
        with:
          accept-license: true

      - name: Install Android SDK packages
        run: |
          yes | sdkmanager "platforms;android-35" "build-tools;35.0.0" >/dev/null 2>&1 || true

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Generate native Android project
        run: npx expo prebuild --platform android --no-install

      - name: Fix missing splashscreen_logo resource
        run: |
          mkdir -p android/app/src/main/res/drawable
          echo 'iVBORw0KGgoAAAANSUhEUgAAAAEAAAABCAYAAAAfFcSJAAAADUlEQVR42mNk+M9QDwADhgGAWjR9awAAAABJRU5ErkJggg==' | base64 -d > android/app/src/main/res/drawable/splashscreen_logo.png

      - name: Fix Compose Compiler Kotlin compatibility
        run: |
          # Patch ALL build.gradle files (including node_modules) to suppress the
          # Kotlin version compatibility check for Compose Compiler.
          # RN 0.76.5 uses Kotlin 1.9.24 but Compose Compiler 1.5.15 needs 1.9.25.
          find . -name "build.gradle" -path "*/android/*" | while read f; do
            if grep -q "composeOptions" "$f"; then
              sed -i '/composeOptions {/a\        suppressKotlinVersionCompatibilityCheck = true' "$f"
            fi
          done
          # Also patch expo-modules-core and any module with Compose enabled
          find node_modules -name "build.gradle" 2>/dev/null | while read f; do
            if grep -q "composeOptions" "$f"; then
              sed -i '/composeOptions {/a\        suppressKotlinVersionCompatibilityCheck = true' "$f"
            fi
          done
          # Force Compose Compiler 1.5.14 (compatible with Kotlin 1.9.24)
          find . -name "build.gradle" -path "*/android/*" -exec sed -i 's/kotlinCompilerExtensionVersion = "1.5.15"/kotlinCompilerExtensionVersion = "1.5.14"/g; s/kotlinCompilerExtensionVersion = '"'"'1.5.15'"'"'/kotlinCompilerExtensionVersion = '"'"'1.5.14'"'"'/g' {} \; 2>/dev/null || true

      - name: Build Debug APK
        working-directory: mobile/android
        run: ./gradlew assembleDebug --no-daemon --max-workers=2

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: careeros-ai-android-apk
          path: mobile/android/app/build/outputs/apk/debug/*.apk
          retention-days: 30
          if-no-files-found: error
