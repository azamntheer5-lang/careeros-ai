name: Android Build

on:
  push:
    branches: [main, mobile-app]
  workflow_dispatch:

jobs:
  build-android:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    defaults:
      run:
        working-directory: mobile

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: mobile/package-lock.json

      - name: Setup Java JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
        with:
          accept-license: true

      - name: Install Android SDK packages
        run: |
          yes | sdkmanager "platforms;android-35" "build-tools;35.0.0" >/dev/null 2>&1 || true

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Generate native Android project
        run: npx expo prebuild --platform android --no-install

      - name: Fix missing splashscreen_logo resource
        run: |
          mkdir -p android/app/src/main/res/drawable
          echo 'iVBORw0KGgoAAAANSUhEUgAAAAEAAAABCAYAAAAfFcSJAAAADUlEQVR42mNk+M9QDwADhgGAWjR9awAAAABJRU5ErkJggg==' | base64 -d > android/app/src/main/res/drawable/splashscreen_logo.png

      - name: Fix Compose Compiler Kotlin compatibility
        run: |
          # expo-modules-core maps Kotlin version → Compose Compiler version:
          #   1.9.24 → 1.5.14 (compatible)
          #   1.9.25 → 1.5.15 (needs Kotlin 1.9.25)
          # RN 0.76.5 uses Kotlin 1.9.24, but root build.gradle defaults to 1.9.25.
          # Setting android.kotlinVersion=1.9.24 makes expo-modules-core select
          # Compose Compiler 1.5.14, which is compatible with the actual Kotlin.
          echo "android.kotlinVersion=1.9.24" >> android/gradle.properties

      - name: Build Debug APK
        working-directory: mobile/android
        run: ./gradlew assembleDebug --no-daemon --max-workers=2

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: careeros-ai-android-apk
          path: mobile/android/app/build/outputs/apk/debug/*.apk
          retention-days: 30
          if-no-files-found: error
